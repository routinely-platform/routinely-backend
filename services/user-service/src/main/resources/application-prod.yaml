spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/user_db
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

jwt:
  secret: ${JWT_SECRET}
  refresh-cookie-secure: ${JWT_REFRESH_COOKIE_SECURE:true}

gateway:
  secret: ${GATEWAY_SECRET}

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:registry-service}:8761/eureka/
