spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/user_db
    password: ${DB_PASSWORD:localpassword}
  jpa:
    properties:
      hibernate:
        format_sql: true
    show-sql: true

jwt:
  secret: ${JWT_SECRET:dGVzdC1zZWNyZXQta2V5LWZvci1obWFjLXNoYTI1Ni1hbGdvcml0aG0h}

gateway:
  secret: ${GATEWAY_SECRET:local-secret}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
