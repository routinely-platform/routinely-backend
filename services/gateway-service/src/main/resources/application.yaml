server:
  port: 8080

spring:
  application:
    name: gateway-service
  main:
    web-application-type: reactive
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/v1/auth/**,/api/v1/users/**

        - id: routine-service
          uri: lb://routine-service
          predicates:
            - Path=/api/v1/routine-templates/**,/api/v1/routine-executions/**,/api/v1/routines/**,/api/v1/feed/**,/api/v1/statistics/**

        - id: challenge-service
          uri: lb://challenge-service
          predicates:
            - Path=/api/v1/challenges/**

        - id: chat-service
          uri: lb://chat-service
          predicates:
            - Path=/api/v1/chat/**,/ws/chat/**

        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/notifications/**

jwt:
  secret: ${JWT_SECRET}

gateway:
  secret: ${GATEWAY_SECRET}

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://registry-service:8761/eureka/
