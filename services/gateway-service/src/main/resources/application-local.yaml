spring:
  data:
    redis:
      host: localhost
      port: 6379

rate-limit:
  capacity: 30
  refill-period-seconds: 60
  fail-open-on-redis-error: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

gateway:
  secret: ${GATEWAY_SECRET:local-secret}

jwt:
  secret: ${JWT_SECRET:dGVzdC1zZWNyZXQta2V5LWZvci1obWFjLXNoYTI1Ni1hbGdvcml0aG0h}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
  allowed-headers: ${CORS_ALLOWED_HEADERS:*}
  allow-credentials: ${CORS_ALLOW_CREDENTIALS:true}
